<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 360px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    th, td {
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
    }
    th {
      font-weight: 600;
      border-bottom: 2px solid #ccc;
    }
    td.time {
      text-align: right;
      white-space: nowrap;
    }
    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .warning strong {
      display: block;
      margin-bottom: 2px;
    }
    #message {
      color: #666;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    button:hover {
      background: #f0f0f0;
    }
    #download {
      background: #0b57d0;
      color: #fff;
      border-color: #0b57d0;
      font-weight: 600;
    }
    #download:hover {
      background: #0842a0;
    }
  </style>
</head>
<body>
  <div id="message">Rooster laden...</div>
  <div id="overview" style="display:none;">
    <h3>Rooster</h3>
    <div id="unknown"></div>
    <div style="max-height: 400px; overflow-y: auto; margin-bottom: 10px;">
      <table>
        <thead>
          <tr><th>Datum</th><th>Dienst</th><th>Van</th><th>Tot</th></tr>
        </thead>
        <tbody id="shifts"></tbody>
      </table>
    </div>
    <button id="download"></button>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 380px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
    }
    .header img {
      width: 20px;
      height: 20px;
    }
    .header h3 {
      margin: 0;
      font-size: 14px;
      flex: 1;
    }
    .header a {
      font-size: 11px;
      color: #0b57d0;
      text-decoration: none;
    }
    .header a:hover {
      text-decoration: underline;
    }
    .content {
      padding: 10px 12px 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 5px 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    th {
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #888;
      border-bottom: 2px solid #e0e0e0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    td.time {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tr:hover:not(.week-sep):not(.total-row) {
      background: #f8f9fa;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .week-sep td {
      border-bottom: none;
      padding: 2px 6px;
      height: auto;
    }
    .week-label {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .total-row td {
      border-top: 2px solid #333;
      border-bottom: none;
      font-weight: 600;
      padding-top: 6px;
    }
    .conflict-row {
      background: #fde8e8 !important;
    }
    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .warning.conflict {
      background: #fde8e8;
      border-color: #e74c3c;
    }
    .warning strong {
      display: block;
      margin-bottom: 2px;
    }
    #message {
      color: #999;
      text-align: center;
      padding: 24px 0;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ddd;
      border-top-color: #0b57d0;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #overview {
      animation: fadeIn 0.2s ease;
    }
    #week-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    .week-chip {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid #ddd;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      color: #999;
      transition: all 0.15s ease;
    }
    .week-chip:hover {
      border-color: #aaa;
    }
    .week-chip.active {
      background: #e8f0fe;
      border-color: #0b57d0;
      color: #0b57d0;
    }
    .week-chip input {
      display: none;
    }
    #stats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 10px;
    }
    .stat-chip {
      font-size: 11px;
      padding: 3px 10px;
      background: #f5f5f5;
      border-radius: 12px;
      color: #666;
    }
    .buttons {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      transition: all 0.15s ease;
    }
    button:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }
    button:active {
      transform: scale(0.98);
    }
    #download {
      flex: 2;
      background: #0b57d0;
      color: #fff;
      border-color: #0b57d0;
      font-weight: 600;
    }
    #download:hover {
      background: #0842a0;
      border-color: #0842a0;
    }
    .success {
      background: #2e7d32 !important;
      border-color: #2e7d32 !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="">
    <h3>Time Care to Calendar</h3>
    <a href="#" id="settings">Instellingen</a>
  </div>
  <div class="content">
    <div id="message"><span class="spinner"></span>Rooster laden...</div>
    <div id="overview" style="display:none;">
      <div id="unknown"></div>
      <div id="conflicts"></div>
      <div id="week-filter"></div>
      <div style="max-height: 400px; overflow-y: auto;">
        <table>
          <thead>
            <tr><th>Datum</th><th>Dienst</th><th>Van</th><th>Tot</th></tr>
          </thead>
          <tbody id="shifts"></tbody>
        </table>
      </div>
      <div id="stats"></div>
      <div class="buttons">
        <button id="download"></button>
        <button id="copy">Kopieer als tekst</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>

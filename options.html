<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      max-width: 540px;
      margin: 0 auto;
      padding: 24px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
    }
    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .page-header img {
      width: 28px;
      height: 28px;
    }
    .page-header h2 {
      margin: 0;
    }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      text-align: left;
      padding: 8px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    th {
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #888;
      border-bottom: 2px solid #e0e0e0;
    }
    tr:hover {
      background: #fafafa;
    }
    input[type="color"] {
      width: 32px;
      height: 28px;
      padding: 2px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #0b57d0;
    }
    select {
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: #0b57d0;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      transition: all 0.15s;
    }
    button:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }
    button:active {
      transform: scale(0.98);
    }
    #save {
      background: #0b57d0;
      color: #fff;
      border-color: #0b57d0;
      font-weight: 600;
    }
    #save:hover {
      background: #0842a0;
      border-color: #0842a0;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 18px;
      line-height: 1;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .delete-btn:hover {
      color: #c00;
      background: #fde8e8;
    }
    #status {
      margin-left: 8px;
      color: #2e7d32;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.visible {
      opacity: 1;
    }
    .unassigned-row {
      background: #fffde7;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <img src="icon.png" alt="">
    <h2>Dienstcodes configureren</h2>
  </div>
  <div class="section-label">Codes</div>
  <table>
    <thead>
      <tr><th>Code</th><th>Naam</th><th>Kleur</th><th>Actie</th><th></th></tr>
    </thead>
    <tbody id="codes"></tbody>
  </table>
  <div class="actions">
    <button id="add">+ Code toevoegen</button>
    <button id="save">Opslaan</button>
    <span id="status">Opgeslagen!</span>
  </div>

  <script src="config.js"></script>
  <script src="options.js"></script>
</body>
</html>
